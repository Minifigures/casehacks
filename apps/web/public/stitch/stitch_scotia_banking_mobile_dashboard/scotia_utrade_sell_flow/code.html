<body class="bg-surface text-on-surface font-sans antialiased min-h-screen flex flex-col selection:bg-primary-container selection:text-on-primary-container">
<!-- Top Navigation (Transactional flow - suppressing main nav elements per shell mandate) -->
<header class="sticky top-0 z-40 bg-surface/80 backdrop-blur-md px-edge-margin h-14 flex items-center justify-between">
<button aria-label="Go back" class="p-2 -ml-2 rounded-full hover:bg-surface-container-low transition-colors active:opacity-80">
<span class="material-symbols-outlined text-primary text-[28px]" style="font-variation-settings: 'wght' 300;">chevron_left</span>
</button>
<h1 class="font-headline-md text-headline-md text-on-surface">Sell AAPL</h1>
<div class="w-10"></div> <!-- Spacer for centering -->
</header>
<!-- Main Canvas -->
<main class="flex-grow px-edge-margin pt-stack-lg pb-[120px] max-w-md mx-auto w-full">
<!-- Stock Context Header -->
<section class="flex flex-col items-center mb-section-gap">
<div class="w-16 h-16 rounded-full bg-surface-container flex items-center justify-center mb-stack-sm shadow-sm overflow-hidden border border-outline-variant/30">
<!-- Apple Logo Placeholder using text since real logo isn't available, keeping it clean and corporate -->
<span class="font-display-lg-mobile text-display-lg-mobile text-on-surface tracking-tighter"></span>
</div>
<h2 class="font-title-lg text-title-lg text-on-surface">Apple Inc.</h2>
<div class="flex items-baseline gap-2 mt-1">
<span class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface">$175.20</span>
<span class="font-body-md text-body-md text-tertiary">Current Price</span>
</div>
<div class="mt-2 bg-surface-container-low px-3 py-1 rounded-full border border-surface-variant">
<span class="font-label-md text-label-md text-on-surface-variant">Available to Sell: 2 Shares</span>
</div>
</section>
<!-- Order Type Toggle -->
<section class="mb-stack-lg bg-surface-container-low p-1 rounded-xl flex shadow-[inset_0_2px_4px_rgba(0,0,0,0.02)]">
<button aria-selected="true" class="flex-1 py-2 px-4 rounded-lg bg-surface shadow-sm font-label-md text-label-md text-on-surface border border-surface-variant transition-all">
                Market Price
            </button>
<button aria-selected="false" class="flex-1 py-2 px-4 rounded-lg font-label-md text-label-md text-on-surface-variant hover:text-on-surface transition-all">
                Limit Order
            </button>
</section>
<!-- Input Area -->
<section class="mb-section-gap">
<div class="bg-surface-container-lowest rounded-2xl p-stack-lg shadow-[0_4px_12px_rgba(0,15,77,0.04)] border border-surface-variant/50 relative overflow-hidden group focus-within:border-secondary transition-colors duration-300">
<label class="block font-label-md text-label-md text-on-surface-variant mb-stack-sm" for="shares-input">Shares to Sell</label>
<div class="flex items-center justify-between">
<input class="bg-transparent border-none p-0 font-display-lg text-display-lg text-on-surface focus:ring-0 w-full outline-none" id="shares-input" max="2" min="1" placeholder="0" type="number" value="1"/>
<span class="font-title-lg text-title-lg text-on-surface-variant pl-4">Shares</span>
</div>
<!-- Interactive subtle background effect on focus -->
<div class="absolute inset-0 bg-secondary/5 opacity-0 group-focus-within:opacity-100 pointer-events-none transition-opacity duration-300"></div>
</div>
</section>
<!-- Summary Section -->
<section class="bg-surface-container-low rounded-2xl p-stack-md border border-surface-variant/30">
<div class="flex justify-between items-center mb-stack-sm">
<span class="font-body-md text-body-md text-on-surface-variant">Estimated Credit</span>
<span class="font-title-lg text-title-lg text-on-surface" id="estimated-credit">$175.20</span>
</div>
<div class="flex justify-between items-center mb-stack-sm">
<span class="font-body-md text-body-md text-on-surface-variant">Commission</span>
<span class="font-body-md text-body-md text-on-surface">$0.00</span>
</div>
<hr class="border-surface-variant my-stack-sm"/>
<p class="font-label-sm text-label-sm text-tertiary">
                Actual execution price may vary slightly due to market fluctuations. Funds will be available in your settlement account typically within 2 business days.
            </p>
</section>
</main>
<!-- Bottom Action Area (Sticky) -->
<div class="fixed bottom-0 left-0 right-0 p-edge-margin pb-[calc(16px+env(safe-area-inset-bottom))] bg-surface/90 backdrop-blur-lg border-t border-surface-variant/50 z-50">
<div class="max-w-md mx-auto">
<button class="w-full bg-primary-container text-on-primary-container h-[52px] rounded-xl font-headline-md text-headline-md shadow-[0_4px_12px_rgba(236,17,26,0.2)] hover:bg-primary transition-colors duration-200 active:scale-[0.98] flex items-center justify-center gap-2">
                Sell AAPL
            </button>
</div>
</div>
<!-- Micro-interaction Script -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const sharesInput = document.getElementById('shares-input');
            const estimatedCreditDisplay = document.getElementById('estimated-credit');
            const currentPrice = 175.20;
            const maxShares = 2;

            // Simple calculation logic
            sharesInput.addEventListener('input', (e) => {
                let val = parseInt(e.target.value);
                
                // Prevent negative or exceeding max
                if (val < 0) {
                    val = 0;
                    e.target.value = 0;
                } else if (val > maxShares) {
                    val = maxShares;
                    e.target.value = maxShares;
                    // Optional: Provide visual feedback that max is reached
                    e.target.parentElement.classList.add('text-error');
                    setTimeout(() => e.target.parentElement.classList.remove('text-error'), 300);
                }

                if (isNaN(val)) val = 0;

                const credit = (val * currentPrice).toFixed(2);
                
                // Animate value change
                estimatedCreditDisplay.style.opacity = '0.5';
                setTimeout(() => {
                    estimatedCreditDisplay.textContent = `$${credit}`;
                    estimatedCreditDisplay.style.opacity = '1';
                }, 150);
            });
            
            // Format input nicely on blur
            sharesInput.addEventListener('blur', (e) => {
                if(e.target.value === '' || e.target.value === '0') {
                    e.target.value = '1';
                    estimatedCreditDisplay.textContent = `$${currentPrice.toFixed(2)}`;
                }
            });
        });
    </script>
