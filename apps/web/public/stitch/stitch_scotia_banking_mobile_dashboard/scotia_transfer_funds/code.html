<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" name="viewport"/>

<style>
        body { -webkit-tap-highlight-color: transparent; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .numpad-btn:active { background-color: #e3e2e5; transform: scale(0.95); }
        .input-glow:focus-within { border-color: #041451; box-shadow: 0 0 0 1px #041451; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-surface text-on-surface font-body-md min-h-screen flex flex-col pt-safe-area-inset-top pb-safe-area-inset-bottom md:hidden">
<!-- Top Navigation (Contextual Task - Suppressing BottomNavBar and modifying TopAppBar for 'Back' flow) -->
<header class="w-full sticky top-0 bg-surface z-50 flex items-center justify-between px-edge-margin h-14">
<button aria-label="Go back" class="w-10 h-10 flex items-center justify-center -ml-2 text-primary hover:opacity-80 transition-opacity duration-200">
<span class="material-symbols-outlined text-[28px]" style="font-variation-settings: 'wght' 300;">chevron_left</span>
</button>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface">Transfer Funds</h1>
<div class="w-10"></div> <!-- Spacer to center title -->
</header>
<main class="flex-1 flex flex-col px-edge-margin pt-stack-lg pb-stack-lg gap-stack-lg">
<!-- Account Selectors Container -->
<div class="flex flex-col gap-unit relative">
<!-- Connection Line (Visual) -->
<div class="absolute left-6 top-10 bottom-10 w-[2px] bg-surface-variant z-0"></div>
<!-- From Account -->
<button class="w-full bg-surface-container-lowest rounded-xl p-4 flex items-center gap-4 border border-surface-variant z-10 active:bg-surface-container-low transition-colors text-left shadow-sm">
<div class="w-12 h-12 rounded-full bg-[#fbf9fc] flex items-center justify-center border border-surface-variant flex-shrink-0">
<span class="material-symbols-outlined text-primary">savings</span>
</div>
<div class="flex-1 min-w-0">
<div class="font-label-md text-label-md text-tertiary mb-1">From</div>
<div class="font-body-md text-body-md text-on-surface font-medium truncate">Momentum Plus Savings</div>
<div class="font-label-md text-label-md text-tertiary mt-0.5">$5,400.00 available</div>
</div>
<span class="material-symbols-outlined text-tertiary">expand_more</span>
</button>
<!-- To Account -->
<button class="w-full bg-surface-container-lowest rounded-xl p-4 flex items-center gap-4 border border-surface-variant z-10 active:bg-surface-container-low transition-colors text-left shadow-sm mt-stack-sm">
<div class="w-12 h-12 rounded-full bg-[#fbf9fc] flex items-center justify-center border border-surface-variant flex-shrink-0">
<span class="material-symbols-outlined text-secondary">trending_up</span>
</div>
<div class="flex-1 min-w-0">
<div class="font-label-md text-label-md text-tertiary mb-1">To</div>
<div class="font-body-md text-body-md text-on-surface font-medium truncate">uTrade Investment Account</div>
<div class="font-label-md text-label-md text-tertiary mt-0.5">$0.00 available</div>
</div>
<span class="material-symbols-outlined text-tertiary">expand_more</span>
</button>
</div>
<!-- Amount Input Area -->
<div class="flex-1 flex flex-col items-center justify-center py-stack-lg mt-stack-md">
<div class="text-tertiary font-body-md mb-2">Amount</div>
<div class="flex items-baseline gap-1 text-on-surface">
<span class="font-display-lg-mobile text-display-lg-mobile opacity-50">$</span>
<span class="font-display-lg text-display-lg tracking-tight" id="amount-display">1,000</span>
<span class="font-display-lg-mobile text-display-lg-mobile opacity-50">.00</span>
</div>
<!-- Frequency Selector (Optional contextual enhancement) -->
<button class="mt-stack-md px-4 py-2 rounded-full bg-surface-container-low flex items-center gap-2 border border-surface-variant active:bg-surface-variant transition-colors">
<span class="material-symbols-outlined text-[18px]">calendar_today</span>
<span class="font-label-md text-label-md">One time, today</span>
<span class="material-symbols-outlined text-[18px]">expand_more</span>
</button>
</div>
<!-- Custom Numpad (Modern iOS style) -->
<div class="grid grid-cols-3 gap-y-4 gap-x-2 w-full max-w-[320px] mx-auto mt-auto mb-stack-lg">
<button class="numpad-btn font-title-lg text-title-lg text-on-surface h-14 rounded-xl transition-all">1</button>
<button class="numpad-btn font-title-lg text-title-lg text-on-surface h-14 rounded-xl transition-all">2</button>
<button class="numpad-btn font-title-lg text-title-lg text-on-surface h-14 rounded-xl transition-all">3</button>
<button class="numpad-btn font-title-lg text-title-lg text-on-surface h-14 rounded-xl transition-all">4</button>
<button class="numpad-btn font-title-lg text-title-lg text-on-surface h-14 rounded-xl transition-all">5</button>
<button class="numpad-btn font-title-lg text-title-lg text-on-surface h-14 rounded-xl transition-all">6</button>
<button class="numpad-btn font-title-lg text-title-lg text-on-surface h-14 rounded-xl transition-all">7</button>
<button class="numpad-btn font-title-lg text-title-lg text-on-surface h-14 rounded-xl transition-all">8</button>
<button class="numpad-btn font-title-lg text-title-lg text-on-surface h-14 rounded-xl transition-all">9</button>
<button class="numpad-btn font-title-lg text-title-lg text-on-surface h-14 rounded-xl transition-all">.</button>
<button class="numpad-btn font-title-lg text-title-lg text-on-surface h-14 rounded-xl transition-all">0</button>
<button class="numpad-btn flex items-center justify-center h-14 rounded-xl transition-all text-on-surface">
<span class="material-symbols-outlined">backspace</span>
</button>
</div>
<!-- Action Button -->
<button class="w-full h-[52px] bg-primary text-on-primary rounded-xl font-body-lg text-body-lg font-semibold active:opacity-80 transition-opacity flex items-center justify-center shadow-md">
            Transfer Now
        </button>
</main>
<!-- BottomNavBar Suppressed: Task-Focused Linear Screen ('Transfer Funds' requires explicit back action, not global navigation) -->
</body></html>
