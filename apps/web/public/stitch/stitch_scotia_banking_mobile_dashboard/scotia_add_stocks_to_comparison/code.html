<script>
        // Simple interaction script to toggle checkbox UI
        document.querySelectorAll('label input[type="checkbox"]').forEach(checkbox => {
            checkbox.addEventListener('change', function() {
                const iconSpan = this.nextElementSibling.querySelector('span');
                if(this.checked) {
                    this.nextElementSibling.classList.remove('border-outline-variant', 'bg-transparent');
                    this.nextElementSibling.classList.add('border-primary', 'bg-primary');
                    iconSpan.classList.remove('text-transparent');
                    iconSpan.classList.add('text-on-primary');
                    iconSpan.textContent = 'check';
                } else {
                    this.nextElementSibling.classList.remove('border-primary', 'bg-primary');
                    this.nextElementSibling.classList.add('border-outline-variant', 'bg-transparent');
                    iconSpan.classList.remove('text-on-primary');
                    iconSpan.classList.add('text-transparent');
                    iconSpan.textContent = 'add';
                }
            });
        });
    </script>
