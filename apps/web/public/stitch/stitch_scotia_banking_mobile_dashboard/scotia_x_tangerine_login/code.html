<body class="bg-surface text-on-surface min-h-screen flex items-center justify-center p-margin-mobile md:p-margin-desktop antialiased relative overflow-hidden">
<div class="fixed top-[-20%] left-[-10%] w-[70vw] h-[70vw] rounded-full bg-primary-fixed-dim opacity-10 blur-[120px] pointer-events-none mix-blend-multiply"></div>
<div class="fixed bottom-[-20%] right-[-10%] w-[60vw] h-[60vw] rounded-full bg-secondary-fixed opacity-20 blur-[100px] pointer-events-none mix-blend-multiply"></div>
<main class="w-full max-w-[420px] bg-surface-container-lowest rounded-[24px] p-md md:p-lg shadow-lg border border-surface-variant flex flex-col gap-lg relative z-10">
<div class="absolute top-0 left-0 w-full h-[4px] bg-kinetic-gradient rounded-t-[24px]"></div>
<div class="flex flex-col items-center gap-md">
<div class="w-[120px] h-[120px] rounded-full bg-surface-container flex items-center justify-center p-sm shadow-sm border border-outline-variant overflow-hidden">
<img alt="Scotia x Tangerine Co-branded Logo" class="w-full h-full object-contain" src="https://lh3.googleusercontent.com/aida/ADBb0ug9G0hVMMS48y_0h-25QJ9HMwLks7_PFRRXc73Jwnp-awy5bGakV7hNiU28a32AHUjP_3Xd5TpsSzxtfeaFfyhkSXOiais49yL6BwUTX-YewwzM-_NivGu-ng7JsUiwkLwhU4SzDuM5zdkI6n1lABwBzuoYQD-PevZlXLUvRR0JRkPny5S59DD4z-eV6ukJD6uYog1HCOhYLigGTDdU75GdTfYq7_mF6OiLaQskBPA8VmKSSLAJ9ufFsxY"/>
</div>
<div class="text-center flex flex-col gap-xs">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-on-surface">Welcome Back</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Sign in to your unified financial hub.</p>
</div>
</div>
<form class="flex flex-col gap-md">
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface" for="username">Username/Card Number</label>
<div class="relative group">
<input class="w-full h-[48px] px-[16px] rounded-lg border border-outline bg-surface-container-lowest text-on-surface font-body-md text-body-md focus:outline-none focus:border-secondary focus:ring-1 focus:ring-secondary transition-colors" id="username" placeholder="Enter your credentials" type="text"/>
</div>
</div>
<div class="flex flex-col gap-xs">
<div class="flex justify-between items-end">
<label class="font-label-md text-label-md text-on-surface" for="password">Password</label>
<a class="font-label-sm text-label-sm text-primary hover:text-secondary transition-colors pb-[2px]" href="#">Forgot?</a>
</div>
<div class="relative group">
<input class="w-full h-[48px] px-[16px] pr-[48px] rounded-lg border border-outline bg-surface-container-lowest text-on-surface font-body-md text-body-md focus:outline-none focus:border-secondary focus:ring-1 focus:ring-secondary transition-colors" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-[12px] top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-on-surface flex items-center justify-center w-[32px] h-[32px] transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility_off">visibility_off</span>
</button>
</div>
</div>
<div class="flex flex-col gap-sm mt-sm">
<button class="w-full h-[56px] rounded-full bg-kinetic-gradient text-on-primary font-label-md text-label-md flex items-center justify-center gap-sm shadow-md hover:shadow-lg transition-all active:scale-[0.98]" type="submit">
                    Sign in with Scotiabank
                    <span class="material-symbols-outlined text-[18px]" data-icon="arrow_forward">arrow_forward</span>
</button>
<div class="w-full h-[56px] rounded-full bg-kinetic-gradient p-[2px] transition-transform active:scale-[0.98]">
<button class="w-full h-full rounded-full bg-surface-container-lowest text-secondary font-label-md text-label-md flex items-center justify-center hover:bg-surface-container-low transition-colors" type="button">
                        Tangerine Login
                    </button>
</div>
<div class="flex justify-center mt-xs">
<a class="font-label-md text-label-md text-on-surface-variant hover:text-primary transition-colors py-[8px] px-[16px]" href="#">Other Banks</a>
</div>
</div>
</form>
