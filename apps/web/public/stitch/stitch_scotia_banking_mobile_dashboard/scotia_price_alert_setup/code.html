<!DOCTYPE html>

<style>
        .ios-toggle-input:checked + .ios-toggle-bg {
            background-color: theme('colors.primary');
        }
        .ios-toggle-input:checked + .ios-toggle-bg .ios-toggle-handle {
            transform: translateX(1.25rem);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-sans antialiased min-h-screen flex flex-col selection:bg-primary-container selection:text-on-primary-container">
<!-- Sub-page Task TopAppBar (BottomNavBar intentionally suppressed due to transactional flow) -->
<header class="w-full sticky top-0 z-50 bg-surface/90 backdrop-blur-md">
<div class="flex items-center justify-between px-edge-margin h-14 w-full">
<button aria-label="Go back" class="text-primary hover:opacity-80 transition-opacity duration-200 flex items-center justify-center w-10 h-10 -ml-2">
<span class="material-symbols-outlined" style="font-size: 24px;">arrow_back_ios_new</span>
</button>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface flex-1 text-center">Set Price Alert</h1>
<div class="w-10"></div> <!-- Balance for flex-between -->
</div>
</header>
<main class="flex-1 overflow-y-auto pb-32">
<!-- Stock Info Header -->
<section class="flex flex-col items-center justify-center py-stack-lg px-edge-margin border-b border-surface-variant">
<div class="w-16 h-16 rounded-full overflow-hidden bg-surface-container shadow-sm mb-stack-sm flex items-center justify-center border border-surface-variant">
<img alt="Apple Logo" class="w-full h-full object-cover" data-alt="A high-quality, minimalist app icon representing a modern technology company. The logo features a sleek, abstract metallic symbol against a pure, bright white background. The lighting is soft and uniform, creating a premium iOS-native aesthetic. The design relies on a clean, corporate palette, emphasizing pristine surfaces and subtle ambient shadows." src="https://lh3.googleusercontent.com/aida-public/AB6AXuA-fx9JYx2FR-tXoCDk2Lw68qsuzydPpKUDbNJ8vO0XR7udfFisLJGKWlBTb0H3OLO6bXYDgkWmVkjpvFmTsrQSlyExipo1k5iif7dTCZ_sXohPwJE17jFJ3fzyfYrT6xRgrfj5IkwJvwWwdnq9XkIEnY02V8C4JAcS9LqoJWoUQAyWg1_m2X2r9_mecaYO25I-AQMqLi3OOKC1zFYgAVgzSmESLeWeCw6-iwnW-ePrEXhydOyvrAal2OGpCJ_laGxgVoChC1C1rc0"/>
</div>
<h2 class="font-title-lg text-title-lg text-on-surface">AAPL</h2>
<p class="font-body-md text-body-md text-tertiary mb-stack-sm">Apple Inc.</p>
<div class="flex items-baseline gap-2">
<span class="font-display-lg-mobile text-display-lg-mobile text-on-surface">$175.20</span>
<span class="font-label-md text-label-md text-on-surface">+ $2.10 (1.21%)</span>
</div>
</section>
<!-- Target Price Input Section -->
<section class="px-edge-margin py-section-gap">
<label class="block font-label-md text-label-md text-tertiary mb-stack-sm text-center uppercase tracking-wider">Target Price</label>
<div class="bg-surface-container-low rounded-xl p-stack-md flex items-center justify-between shadow-sm border border-surface-variant">
<button aria-label="Decrease price" class="w-12 h-12 rounded-full bg-surface shadow-sm border border-surface-variant flex items-center justify-center text-primary hover:bg-surface-variant transition-colors">
<span class="material-symbols-outlined">remove</span>
</button>
<div class="flex flex-col items-center">
<div class="flex items-center text-primary">
<span class="font-headline-md text-headline-md mt-1 mr-1">$</span>
<input class="bg-transparent border-none text-center font-display-lg text-display-lg text-primary w-32 focus:ring-0 p-0 m-0" type="number" value="180.00"/>
</div>
<span class="font-label-sm text-label-sm text-tertiary mt-1">+2.74% from current</span>
</div>
<button aria-label="Increase price" class="w-12 h-12 rounded-full bg-surface shadow-sm border border-surface-variant flex items-center justify-center text-primary hover:bg-surface-variant transition-colors">
<span class="material-symbols-outlined">add</span>
</button>
</div>
</section>
<!-- Alert Preferences Sections -->
<section class="px-edge-margin space-y-stack-lg">
<!-- Alert Me via -->
<div>
<h3 class="font-title-lg text-title-lg text-on-surface mb-stack-md">Alert Me</h3>
<div class="bg-surface-container-low rounded-xl border border-surface-variant overflow-hidden">
<!-- Push Notification Toggle -->
<label class="flex items-center justify-between p-stack-md border-b border-surface-variant cursor-pointer active:bg-surface-variant/50 transition-colors">
<div class="flex items-center gap-stack-md">
<span class="material-symbols-outlined text-tertiary" style="font-variation-settings: 'FILL' 0;">notifications_active</span>
<span class="font-body-md text-body-md text-on-surface">Push Notification</span>
</div>
<div class="relative inline-block w-12 h-7">
<input checked="" class="ios-toggle-input sr-only" type="checkbox"/>
<div class="ios-toggle-bg block w-12 h-7 bg-surface-variant rounded-full transition-colors duration-200">
<div class="ios-toggle-handle absolute left-[2px] top-[2px] bg-white w-6 h-6 rounded-full transition-transform duration-200 shadow-sm border border-surface-variant"></div>
</div>
</div>
</label>
<!-- Email Toggle -->
<label class="flex items-center justify-between p-stack-md cursor-pointer active:bg-surface-variant/50 transition-colors">
<div class="flex items-center gap-stack-md">
<span class="material-symbols-outlined text-tertiary" style="font-variation-settings: 'FILL' 0;">mail</span>
<span class="font-body-md text-body-md text-on-surface">Email</span>
</div>
<div class="relative inline-block w-12 h-7">
<input class="ios-toggle-input sr-only" type="checkbox"/>
<div class="ios-toggle-bg block w-12 h-7 bg-surface-variant rounded-full transition-colors duration-200">
<div class="ios-toggle-handle absolute left-[2px] top-[2px] bg-white w-6 h-6 rounded-full transition-transform duration-200 shadow-sm border border-surface-variant"></div>
</div>
</div>
</label>
</div>
</div>
<!-- Alert Frequency -->
<div>
<h3 class="font-title-lg text-title-lg text-on-surface mb-stack-md">Alert Frequency</h3>
<div class="bg-surface-container rounded-lg p-1 flex">
<button class="flex-1 py-2 text-center rounded-md bg-surface shadow-sm font-label-md text-label-md text-on-surface">
                        Once
                    </button>
<button class="flex-1 py-2 text-center rounded-md bg-transparent font-label-md text-label-md text-tertiary hover:bg-surface-variant/50 transition-colors">
                        Every time
                    </button>
</div>
<p class="font-label-sm text-label-sm text-tertiary mt-stack-sm px-1">
                    The alert will be deleted after it triggers the first time.
                </p>
</div>
</section>
</main>
<!-- Fixed Bottom Action Area -->
<div class="fixed bottom-0 w-full px-edge-margin pb-6 pt-4 bg-surface/90 backdrop-blur-md border-t border-surface-variant z-50 shadow-[0_-4px_12px_rgba(0,0,0,0.02)]">
<button class="w-full h-[52px] bg-primary text-on-primary font-title-lg text-title-lg rounded-xl flex items-center justify-center hover:opacity-90 active:scale-[0.98] transition-all">
            Create Alert
        </button>
</div>
</body></html>
