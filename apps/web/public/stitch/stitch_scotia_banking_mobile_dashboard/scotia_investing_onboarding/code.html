<body class="bg-surface text-on-surface min-h-screen flex flex-col font-sans antialiased selection:bg-primary-container selection:text-on-primary-container">
<!-- TopAppBar JSON Rendering -->

<img alt="User profile photo of Marco" class="w-full h-full object-cover" data-alt="A professional headshot of a smiling young man named Marco, representing a user profile avatar. He has short dark hair and is wearing a crisp white shirt. The background is a soft, blurred light grey studio backdrop. The lighting is bright and even, fitting a modern light-mode corporate design system. The overall mood is approachable and trustworthy." src="https://lh3.googleusercontent.com/aida-public/AB6AXuC_b7U7v-uf9Nh9lvbTeC8RcEE8pAw8ZHQrXCDXi7tzlDlBSMDW9hLB32NY8LBKQCEZcuZj5ps-p2QcsFCHIiMuO7nDSP5h-MgK6lm1wwckRLzZsi_xSivc9AvRrpAdOL7I40AgetBfAt-SQRFJOtJXEHfMb2oOTXn_EJOyXGCs0jmCazagv2goDFxjKgvqvMvw185GXKdPnN5wl-NQ34rpdkXMb2lWm-uDapcUEtTw-mK3pQJh1au69hj727Wkl65FfePD-jzpoog"/>
</div>
<span class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface">Hi, Marco</span>
</div>
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-variant/20 transition-opacity duration-200 text-on-surface-variant">
<span class="material-symbols-outlined text-[24px]">notifications</span>
</button>
</div>
</header>
<!-- Main Content Area -->
<main class="flex-grow flex flex-col px-edge-margin pt-stack-md pb-[100px]">
<!-- Progress Bar -->
<div class="w-full mb-section-gap">
<div class="flex justify-between items-end mb-unit">
<span class="font-label-sm text-label-sm text-tertiary uppercase tracking-wider">Progress</span>
<span class="font-label-sm text-label-sm text-primary-container">1 of 2</span>
</div>
<div class="w-full h-1.5 bg-surface-container-highest rounded-full overflow-hidden">
<div class="h-full bg-primary-container rounded-full w-1/2 transition-all duration-500 ease-out"></div>
</div>
</div>
<!-- Quiz Content -->
<div class="flex-grow flex flex-col">
<h1 class="font-display-lg-mobile text-display-lg-mobile text-on-surface mb-section-gap leading-tight">
                When do you need this money?
            </h1>
<div class="flex flex-col gap-stack-md">
<!-- Option 1 -->
<button class="w-full text-left bg-surface-bright border-2 border-surface-container-highest hover:border-outline-variant rounded-2xl p-stack-md flex items-center justify-between transition-all duration-200 active:scale-[0.98] group">
<span class="font-title-lg text-title-lg text-on-surface group-hover:text-primary-container transition-colors">Within 1 year</span>
<div class="w-6 h-6 rounded-full border-2 border-surface-container-highest group-hover:border-primary-container flex items-center justify-center transition-colors"></div>
</button>
<!-- Option 2 -->
<button class="w-full text-left bg-surface-bright border-2 border-surface-container-highest hover:border-outline-variant rounded-2xl p-stack-md flex items-center justify-between transition-all duration-200 active:scale-[0.98] group">
<span class="font-title-lg text-title-lg text-on-surface group-hover:text-primary-container transition-colors">1–5 years</span>
<div class="w-6 h-6 rounded-full border-2 border-surface-container-highest group-hover:border-primary-container flex items-center justify-center transition-colors"></div>
</button>
<!-- Option 3 -->
<button class="w-full text-left bg-surface-bright border-2 border-surface-container-highest hover:border-outline-variant rounded-2xl p-stack-md flex items-center justify-between transition-all duration-200 active:scale-[0.98] group">
<span class="font-title-lg text-title-lg text-on-surface group-hover:text-primary-container transition-colors">5+ years</span>
<div class="w-6 h-6 rounded-full border-2 border-surface-container-highest group-hover:border-primary-container flex items-center justify-center transition-colors"></div>
</button>
</div>
</div>
</main>
<!-- Fixed Bottom Footer (Transactional/Linear flow, BottomNavBar suppressed) -->
<footer class="fixed bottom-0 w-full bg-surface/90 backdrop-blur-md pb-safe-area-inset-bottom pt-stack-md px-edge-margin z-40 border-t border-surface-container-low">
<button class="w-full h-[52px] rounded-[16px] bg-surface-container-highest text-tertiary-fixed-dim font-headline-md text-headline-md flex items-center justify-center cursor-not-allowed opacity-80" disabled="">
            Continue
        </button>
</footer>
<script>
        // Simple interaction script to demonstrate state change (optional polish)
        document.addEventListener('DOMContentLoaded', () => {
            const options = document.querySelectorAll('main button');
            const continueBtn = document.querySelector('footer button');

            options.forEach(option => {
                option.addEventListener('click', () => {
                    // Reset all options
                    options.forEach(opt => {
                        opt.classList.remove('border-primary-container', 'bg-surface-container-low');
                        opt.classList.add('border-surface-container-highest', 'bg-surface-bright');
                        const circle = opt.querySelector('div');
                        circle.classList.remove('border-primary-container', 'bg-primary-container');
                        circle.classList.add('border-surface-container-highest');
                        circle.innerHTML = '';
                    });

                    // Set active option
                    option.classList.remove('border-surface-container-highest', 'bg-surface-bright');
                    option.classList.add('border-primary-container', 'bg-surface-container-low');
                    
                    const activeCircle = option.querySelector('div');
                    activeCircle.classList.remove('border-surface-container-highest');
                    activeCircle.classList.add('border-primary-container', 'bg-primary-container');
                    activeCircle.innerHTML = '<span class="material-symbols-outlined text-white text-[16px]" style="font-variation-settings: \'wght\' 700;">check</span>';

                    // Enable continue button
                    continueBtn.disabled = false;
                    continueBtn.classList.remove('bg-surface-container-highest', 'text-tertiary-fixed-dim', 'cursor-not-allowed', 'opacity-80');
                    continueBtn.classList.add('bg-primary-container', 'text-white', 'cursor-pointer', 'active:scale-95', 'transition-transform');
                });
            });
        });
    </script>
