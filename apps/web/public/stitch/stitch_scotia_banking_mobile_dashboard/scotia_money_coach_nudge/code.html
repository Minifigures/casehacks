    body {

<body class="bg-surface text-on-surface antialiased min-h-screen flex flex-col pt-safe-top pb-safe-bottom">
<!-- TopAppBar -->
<header class="w-full sticky top-0 bg-surface z-40 flat no shadows flex items-center justify-between px-edge-margin h-14 w-full">
<div class="flex items-center gap-2">
<div class="w-8 h-8 rounded-full overflow-hidden bg-surface-container flex items-center justify-center">
<img alt="User profile photo of Marco" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAuUcA5HgBVOl1zsYqTU8sAfVYg3ZAq7qcISb2-uFJN-4AEDxMAzQ8SRoT3gUnbWbI9WTvJxl12dJ8UNAJfpCLN7Zo60K2cBPuHvvdv9VstLNoTzwx4zK3slvhaeIcZYpMUdK-jeD_PxINVBuMNjnLm-SWDhlqG-egf6xgKZ5nzBuan3A1sJiU9epQQLPx9l46bwnGbtibPeFwpvUpB0-XsR2mbYVjcDmqeojeBHHlPg2-DMItb6rwJDqBvn9dFe05WlPVgZMb_k6w"/>
</div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile font-bold text-primary">Hi, Marco</h1>
</div>
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-variant/20 transition-opacity duration-200 text-on-surface-variant">
<span class="material-symbols-outlined" data-icon="notifications">notifications</span>
</button>
</header>
<!-- Main Content -->
<main class="flex-grow px-edge-margin pt-stack-lg pb-section-gap flex flex-col gap-section-gap">
<!-- Section Header -->
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-secondary" data-icon="temp_preferences_custom" style="font-variation-settings: 'FILL' 1;">temp_preferences_custom</span>
<h2 class="font-title-lg text-title-lg text-on-surface">Scotia Money Coach</h2>
</div>
<!-- AI Insight Card -->
<div class="w-full rounded-xl ai-gradient border border-outline-variant/30 p-stack-lg shadow-[0px_4px_12px_rgba(0,15,77,0.04)] relative overflow-hidden">
<!-- Decorative gradient blur behind text -->
<div class="absolute -top-10 -right-10 w-32 h-32 bg-secondary-container/40 rounded-full blur-2xl"></div>
<p class="font-headline-md text-headline-md text-on-surface relative z-10">
                Hey Marco — you got paid $1,800 yesterday. Auto-invest $50 toward your FHSA home goal?
            </p>
<!-- Actions -->
<div class="mt-section-gap flex gap-gutter w-full relative z-10">
<button class="flex-1 bg-primary-container text-on-primary-container h-[52px] rounded-lg font-body-lg text-body-lg font-semibold flex items-center justify-center active:scale-95 transition-transform shadow-[0px_4px_12px_rgba(0,15,77,0.08)]">
                    Confirm $50
                </button>
<button class="flex-1 border-2 border-primary text-primary h-[52px] rounded-lg font-body-lg text-body-lg font-semibold flex items-center justify-center active:scale-95 transition-transform bg-surface/50 backdrop-blur-sm">
                    Adjust
                </button>
</div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full z-50 bg-surface-container-lowest border-t border-outline-variant flat no shadows flex justify-around items-center pt-2 pb-[env(safe-area-inset-bottom,16px)] w-full">
<button class="flex flex-col items-center justify-center text-tertiary hover:bg-surface-variant/20 active:scale-95 transition-transform duration-150 p-2 rounded-lg w-16">
<span class="material-symbols-outlined mb-1" data-icon="account_balance">account_balance</span>
<span class="font-label-sm text-label-sm">Accounts</span>
</button>
<button class="flex flex-col items-center justify-center text-tertiary hover:bg-surface-variant/20 active:scale-95 transition-transform duration-150 p-2 rounded-lg w-16">
<span class="material-symbols-outlined mb-1" data-icon="swap_horiz">swap_horiz</span>
<span class="font-label-sm text-label-sm">Move Money</span>
</button>
<button class="flex flex-col items-center justify-center text-tertiary hover:bg-surface-variant/20 active:scale-95 transition-transform duration-150 p-2 rounded-lg w-16">
<span class="material-symbols-outlined mb-1" data-icon="payments">payments</span>
<span class="font-label-sm text-label-sm">Bills</span>
</button>
<button class="flex flex-col items-center justify-center text-primary hover:bg-surface-variant/20 active:scale-95 transition-transform duration-150 p-2 rounded-lg w-16">
<span class="material-symbols-outlined mb-1" data-icon="query_stats" style="font-variation-settings: 'FILL' 1;">query_stats</span>
<span class="font-label-sm text-label-sm">Insights</span>
</button>
<button class="flex flex-col items-center justify-center text-tertiary hover:bg-surface-variant/20 active:scale-95 transition-transform duration-150 p-2 rounded-lg w-16">
<span class="material-symbols-outlined mb-1" data-icon="menu">menu</span>
<span class="font-label-sm text-label-sm">More</span>
</button>
</nav>
