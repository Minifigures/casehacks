<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Scotia uTrade - Compare Stocks</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "tertiary-container": "#75777b",
                        "inverse-on-surface": "#f2f0f3",
                        "on-background": "#1b1b1e",
                        "surface-tint": "#c0000f",
                        "on-primary-fixed-variant": "#930008",
                        "surface-container-lowest": "#ffffff",
                        "background": "#fbf9fc",
                        "on-error-container": "#93000a",
                        "primary": "#bf000f",
                        "on-primary-container": "#ffffff",
                        "on-secondary-fixed-variant": "#36427e",
                        "on-error": "#ffffff",
                        "on-secondary-container": "#3c4985",
                        "on-secondary": "#ffffff",
                        "on-tertiary": "#ffffff",
                        "on-primary": "#ffffff",
                        "tertiary-fixed": "#e2e2e7",
                        "surface-container": "#efedf0",
                        "on-primary-fixed": "#410001",
                        "inverse-surface": "#303033",
                        "error": "#ba1a1a",
                        "surface-bright": "#fbf9fc",
                        "surface": "#fbf9fc",
                        "surface-dim": "#dbd9dd",
                        "secondary-fixed": "#dde1ff",
                        "outline": "#936e69",
                        "outline-variant": "#e9bcb6",
                        "on-tertiary-container": "#040508",
                        "secondary": "#4e5a98",
                        "surface-container-high": "#e9e7eb",
                        "inverse-primary": "#ffb4aa",
                        "surface-container-highest": "#e3e2e5",
                        "secondary-fixed-dim": "#b9c3ff",
                        "on-surface": "#1b1b1e",
                        "on-surface-variant": "#5e3f3b",
                        "primary-fixed-dim": "#ffb4aa",
                        "primary-container": "#ec111a",
                        "primary-fixed": "#ffdad5",
                        "surface-container-low": "#f5f3f6",
                        "on-secondary-fixed": "#041451",
                        "tertiary-fixed-dim": "#c6c6cb",
                        "secondary-container": "#aebaff",
                        "tertiary": "#5d5e62",
                        "on-tertiary-fixed-variant": "#45474b",
                        "on-tertiary-fixed": "#1a1c1f",
                        "surface-variant": "#e3e2e5",
                        "error-container": "#ffdad6"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "stack-sm": "8px",
                        "stack-md": "16px",
                        "unit": "4px",
                        "gutter": "12px",
                        "stack-lg": "24px",
                        "section-gap": "32px",
                        "edge-margin": "16px"
                    },
                    "fontFamily": {
                        "label-sm": ["Inter"],
                        "headline-lg": ["Inter"],
                        "display-lg-mobile": ["Inter"],
                        "headline-md": ["Inter"],
                        "display-lg": ["Inter"],
                        "body-lg": ["Inter"],
                        "headline-lg-mobile": ["Inter"],
                        "label-md": ["Inter"],
                        "title-lg": ["Inter"],
                        "body-md": ["Inter"]
                    },
                    "fontSize": {
                        "label-sm": ["11px", { "lineHeight": "13px", "fontWeight": "600" }],
                        "headline-lg": ["28px", { "lineHeight": "34px", "letterSpacing": "-0.01em", "fontWeight": "700" }],
                        "display-lg-mobile": ["28px", { "lineHeight": "34px", "fontWeight": "700" }],
                        "headline-md": ["22px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "display-lg": ["34px", { "lineHeight": "41px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "body-lg": ["17px", { "lineHeight": "22px", "fontWeight": "400" }],
                        "headline-lg-mobile": ["24px", { "lineHeight": "30px", "fontWeight": "700" }],
                        "label-md": ["13px", { "lineHeight": "18px", "letterSpacing": "0.01em", "fontWeight": "500" }],
                        "title-lg": ["20px", { "lineHeight": "25px", "fontWeight": "600" }],
                        "body-md": ["15px", { "lineHeight": "20px", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined.filled {
            font-variation-settings: 'FILL' 1;
        }
        
        /* Subtle scrollbar */
        ::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #dbd9dd;
            border-radius: 4px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col antialiased selection:bg-primary-container selection:text-on-primary-container">
<!-- TopAppBar (Transactional - Hidden main nav shell per logic, simplified header) -->
<header class="w-full h-14 bg-surface flex justify-between items-center px-edge-margin sticky top-0 z-40 border-b border-surface-variant">
<button aria-label="Go back" class="flex items-center justify-center w-10 h-10 -ml-2 rounded-full hover:bg-surface-container-low transition-colors group">
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-primary transition-colors">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md text-on-surface flex-1 text-center">Compare Stocks</h1>
<div class="w-10 h-10"></div> <!-- Spacer for centering -->
</header>
<main class="flex-1 w-full max-w-3xl mx-auto px-edge-margin py-stack-lg space-y-section-gap">
<!-- Selection Area -->
<section>
<div class="flex items-center justify-between mb-stack-md">
<h2 class="font-title-lg text-title-lg text-on-surface">Comparing 2 Assets</h2>
<button class="text-primary font-label-md text-label-md flex items-center gap-1 hover:opacity-80 transition-opacity">
<span class="material-symbols-outlined text-[16px]">add</span> Add
                </button>
</div>
<div class="grid grid-cols-2 gap-gutter relative">
<!-- VS Divider -->
<div class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 w-8 h-8 rounded-full bg-surface-container-highest border-2 border-background flex items-center justify-center z-10 shadow-sm">
<span class="font-label-sm text-label-sm text-on-surface-variant">VS</span>
</div>
<!-- Stock 1: AAPL -->
<div class="bg-surface-container-lowest rounded-xl p-stack-md shadow-sm border border-surface-variant relative overflow-hidden group hover:border-primary transition-colors cursor-pointer">
<div class="absolute top-0 left-0 w-1 h-full bg-primary-container"></div>
<div class="flex items-start justify-between mb-stack-sm">
<div class="w-12 h-12 rounded-lg bg-[#000000] flex items-center justify-center shadow-sm">
<span class="material-symbols-outlined filled text-white text-[24px]">ios</span>
</div>
<button aria-label="Remove AAPL" class="text-tertiary hover:text-error transition-colors">
<span class="material-symbols-outlined text-[20px]">close</span>
</button>
</div>
<h3 class="font-headline-md text-headline-md text-on-surface mb-unit">AAPL</h3>
<p class="font-body-md text-body-md text-on-surface-variant line-clamp-1">Apple Inc.</p>
</div>
<!-- Stock 2: TSLA -->
<div class="bg-surface-container-lowest rounded-xl p-stack-md shadow-sm border border-surface-variant relative overflow-hidden group hover:border-outline transition-colors cursor-pointer">
<div class="absolute top-0 left-0 w-1 h-full bg-secondary"></div>
<div class="flex items-start justify-between mb-stack-sm">
<div class="w-12 h-12 rounded-lg bg-[#E31937] flex items-center justify-center shadow-sm">
<span class="material-symbols-outlined filled text-white text-[24px]">electric_car</span>
</div>
<button aria-label="Remove TSLA" class="text-tertiary hover:text-error transition-colors">
<span class="material-symbols-outlined text-[20px]">close</span>
</button>
</div>
<h3 class="font-headline-md text-headline-md text-on-surface mb-unit">TSLA</h3>
<p class="font-body-md text-body-md text-on-surface-variant line-clamp-1">Tesla, Inc.</p>
</div>
</div>
</section>
<!-- Comparison Grid -->
<section class="bg-surface-container-lowest rounded-xl shadow-sm border border-surface-variant overflow-hidden">
<div class="overflow-x-auto">
<table class="w-full text-left border-collapse">
<thead>
<tr class="border-b border-surface-variant bg-surface-container-low">
<th class="py-stack-md px-edge-margin font-label-md text-label-md text-on-surface-variant w-1/3">Metric</th>
<th class="py-stack-md px-edge-margin font-label-md text-label-md text-primary w-1/3">AAPL</th>
<th class="py-stack-md px-edge-margin font-label-md text-label-md text-secondary w-1/3">TSLA</th>
</tr>
</thead>
<tbody class="divide-y divide-surface-variant">
<!-- Current Price -->
<tr class="hover:bg-surface-container-low/50 transition-colors">
<td class="py-stack-md px-edge-margin font-body-md text-body-md text-on-surface-variant">Current Price</td>
<td class="py-stack-md px-edge-margin font-headline-md text-headline-md text-on-surface">$173.50</td>
<td class="py-stack-md px-edge-margin font-headline-md text-headline-md text-on-surface">$175.22</td>
</tr>
<!-- Day Change -->
<tr class="hover:bg-surface-container-low/50 transition-colors">
<td class="py-stack-md px-edge-margin font-body-md text-body-md text-on-surface-variant">Day Change</td>
<td class="py-stack-md px-edge-margin">
<div class="flex flex-col gap-unit">
<span class="font-label-md text-label-md text-[#2e7d32] flex items-center">
<span class="material-symbols-outlined text-[16px]">arrow_upward</span>
                                        +1.2%
                                    </span>
<div class="h-6 w-full opacity-60">
<svg class="w-full h-full stroke-[#2e7d32] fill-transparent stroke-[1.5]" preserveaspectratio="none" viewbox="0 0 100 20">
<path d="M0,15 Q10,10 20,12 T40,8 T60,14 T80,5 T100,2"></path>
</svg>
</div>
</div>
</td>
<td class="py-stack-md px-edge-margin">
<div class="flex flex-col gap-unit">
<span class="font-label-md text-label-md text-error flex items-center">
<span class="material-symbols-outlined text-[16px]">arrow_downward</span>
                                        -2.4%
                                    </span>
<div class="h-6 w-full opacity-60">
<svg class="w-full h-full stroke-error fill-transparent stroke-[1.5]" preserveaspectratio="none" viewbox="0 0 100 20">
<path d="M0,5 Q10,8 20,6 T40,12 T60,8 T80,15 T100,18"></path>
</svg>
</div>
</div>
</td>
</tr>
<!-- Market Cap -->
<tr class="hover:bg-surface-container-low/50 transition-colors">
<td class="py-stack-md px-edge-margin font-body-md text-body-md text-on-surface-variant flex items-center gap-1">
                                Market Cap
                                <span class="material-symbols-outlined text-[14px] text-tertiary cursor-help" title="Total market value of a company's outstanding shares of stock">info</span>
</td>
<td class="py-stack-md px-edge-margin font-body-lg text-body-lg text-on-surface">2.68T</td>
<td class="py-stack-md px-edge-margin font-body-lg text-body-lg text-on-surface">554.8B</td>
</tr>
<!-- P/E Ratio -->
<tr class="hover:bg-surface-container-low/50 transition-colors">
<td class="py-stack-md px-edge-margin font-body-md text-body-md text-on-surface-variant flex items-center gap-1">
                                P/E Ratio
                                <span class="material-symbols-outlined text-[14px] text-tertiary cursor-help" title="Price-to-Earnings Ratio">info</span>
</td>
<td class="py-stack-md px-edge-margin font-body-lg text-body-lg text-on-surface">26.54</td>
<td class="py-stack-md px-edge-margin font-body-lg text-body-lg text-on-surface bg-primary/10 rounded font-semibold">42.18</td>
</tr>
<!-- Dividend Yield -->
<tr class="hover:bg-surface-container-low/50 transition-colors">
<td class="py-stack-md px-edge-margin font-body-md text-body-md text-on-surface-variant">Div Yield</td>
<td class="py-stack-md px-edge-margin font-body-lg text-body-lg text-on-surface bg-primary/10 rounded font-semibold">0.55%</td>
<td class="py-stack-md px-edge-margin font-body-lg text-body-lg text-on-surface">N/A</td>
</tr>
<!-- Analyst Rating -->
<tr class="hover:bg-surface-container-low/50 transition-colors">
<td class="py-stack-md px-edge-margin font-body-md text-body-md text-on-surface-variant">Analyst Rating</td>
<td class="py-stack-md px-edge-margin">
<span class="inline-flex items-center px-2 py-1 rounded-full bg-[#e8f5e9] text-[#2e7d32] font-label-sm text-label-sm">Strong Buy</span>
</td>
<td class="py-stack-md px-edge-margin">
<span class="inline-flex items-center px-2 py-1 rounded-full bg-[#fff3e0] text-[#ef6c00] font-label-sm text-label-sm">Hold</span>
</td>
</tr>
</tbody>
</table>
</div>
</section>
<div class="pt-stack-md">
<button class="w-full bg-primary-container text-on-primary-container font-label-md text-label-md py-3 rounded-lg shadow-sm hover:opacity-90 transition-opacity flex items-center justify-center gap-2">
                Trade Selected Asset
            </button>
</div>
</main>
</body></html>
