<script>
        // Lightweight interaction script for swipe visual feedback
        document.addEventListener('DOMContentLoaded', () => {
            const card = document.querySelector('.card-front');
            let isDragging = false;
            let startX = 0;
            
            // Mouse events for previewing
            card.addEventListener('mousedown', (e) => {
                isDragging = true;
                startX = e.clientX;
                card.style.transition = 'none';
            });

            window.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                const deltaX = e.clientX - startX;
                // Limit the drag visually for the mockup
                if (deltaX > -150 && deltaX < 150) {
                     const rotate = deltaX * 0.05;
                     card.style.transform = `translateX(${deltaX}px) rotate(${rotate}deg)`;
                }
            });

            window.addEventListener('mouseup', () => {
                if (!isDragging) return;
                isDragging = false;
                card.style.transition = 'transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1)';
                card.style.transform = 'translateX(0) rotate(0)';
            });
            
            // Touch events
            card.addEventListener('touchstart', (e) => {
                isDragging = true;
                startX = e.touches[0].clientX;
                card.style.transition = 'none';
            });
            
            window.addEventListener('touchmove', (e) => {
                 if (!isDragging) return;
                 const deltaX = e.touches[0].clientX - startX;
                 if (deltaX > -150 && deltaX < 150) {
                     const rotate = deltaX * 0.05;
                     card.style.transform = `translateX(${deltaX}px) rotate(${rotate}deg)`;
                 }
            });
            
            window.addEventListener('touchend', () => {
                if (!isDragging) return;
                isDragging = false;
                card.style.transition = 'transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1)';
                card.style.transform = 'translateX(0) rotate(0)';
            });
        });
    </script>
