<!DOCTYPE html>

<style>
        .kinetic-gradient {
            background: linear-gradient(135deg, #bf000f 0%, #fd8100 100%);
        }
        .kinetic-gradient:hover {
            background: linear-gradient(150deg, #bf000f 0%, #fd8100 100%);
        }
        .text-gradient {
            background: linear-gradient(135deg, #bf000f 0%, #fd8100 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid #e2e2e9;
        }
        .shadow-ambient {
            box-shadow: 0 12px 32px rgba(236, 17, 26, 0.08);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-background text-on-background min-h-screen pb-xl antialiased">
<!-- TopAppBar -->
<header class="bg-surface w-full sticky top-0 transition-opacity duration-200 z-40">
<div class="flex items-center justify-between px-margin-mobile h-14 w-full md:px-margin-desktop md:h-16">
<div class="flex items-center gap-sm">
<img alt="Marco Profile" class="w-8 h-8 rounded-full border border-outline-variant" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAz46C7-Jjv0ubQgtLiUSb3w0eUafQCY6AT-FQvcZ7TXMjSRmBIiR07aGfmXMOTmYIT47e5e5Ggx92aWsfLPwk8GgcT7wbCIUV_X8B74s2bz6ui-zWoOUDwzHLg77zFmFUc6JUJvHnS6REuizMZ1p8BYW-GGnHsoj1ZkbZR40Ahy20_kQU3dz98slWnokolG5bOTz4Gej3mLwdIEJXKOi_noqrpBnOV_3Y2nXEYRJKPyWgHgZ-JjSMsWau0VgwJCreKyZS4bVeuPE0"/>
</div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg font-bold text-primary text-center">Hi, Marco</h1>
<div class="flex items-center">
<button class="hover:opacity-80 transition-opacity p-2 text-primary">
<span class="material-symbols-outlined" data-icon="notifications" style="font-variation-settings: 'FILL' 0;">notifications</span>
</button>
</div>
</div>
</header>
<main class="px-margin-mobile pt-md pb-xl md:px-margin-desktop max-w-4xl mx-auto space-y-md">
<!-- Header Section -->
<section class="text-center space-y-xs animate-[fadeIn_0.5s_ease-out]">
<h2 class="font-display-lg text-display-lg text-on-surface">You're all set, Marco!</h2>
<p class="font-body-lg text-body-lg text-tertiary">Your unified financial hub is ready.</p>
</section>
<!-- Hero Card -->
<section class="kinetic-gradient rounded-xl p-md shadow-ambient text-on-primary relative overflow-hidden group hover:-translate-y-1 transition-transform duration-300">
<div class="absolute -right-10 -top-10 w-40 h-40 bg-white opacity-10 rounded-full blur-2xl group-hover:scale-110 transition-transform duration-500"></div>
<div class="space-y-base relative z-10">
<p class="font-label-md text-label-md opacity-90 uppercase tracking-widest">Total Net Worth</p>
<div class="flex items-baseline gap-xs">
<span class="font-headline-md text-headline-md">$</span>
<span class="font-display-lg text-display-lg">84,250.00</span>
</div>
<div class="inline-flex items-center bg-white/20 rounded-full px-sm py-xs gap-xs mt-sm backdrop-blur-sm border border-white/30">
<span class="material-symbols-outlined text-[16px]">trending_up</span>
<span class="font-label-sm text-label-sm">+2.4% this month</span>
</div>
</div>
</section>
<!-- Sync Status Bento Grid -->
<section class="grid grid-cols-1 md:grid-cols-2 gap-md">
<!-- Scotiabank -->
<div class="glass-card rounded-xl p-md flex items-center justify-between shadow-sm relative overflow-hidden group">
<div class="absolute left-0 top-0 bottom-0 w-1 bg-primary group-hover:w-2 transition-all duration-300"></div>
<div class="flex items-center gap-sm">
<div class="w-12 h-12 rounded-full bg-surface-container flex items-center justify-center text-primary border border-outline-variant">
<span class="material-symbols-outlined" data-icon="account_balance">account_balance</span>
</div>
<div>
<h3 class="font-headline-md text-headline-md text-on-surface">Scotiabank</h3>
<p class="font-label-sm text-label-sm text-tertiary">Last synced: Just now</p>
</div>
</div>
<div class="w-8 h-8 rounded-full bg-secondary-fixed flex items-center justify-center text-secondary">
<span class="material-symbols-outlined text-[20px]" data-icon="check_circle">check_circle</span>
</div>
</div>
<!-- Tangerine -->
<div class="glass-card rounded-xl p-md flex items-center justify-between shadow-sm relative overflow-hidden group">
<div class="absolute left-0 top-0 bottom-0 w-1 bg-secondary-container group-hover:w-2 transition-all duration-300"></div>
<div class="flex items-center gap-sm">
<div class="w-12 h-12 rounded-full bg-surface-container flex items-center justify-center text-secondary-container border border-outline-variant">
<span class="material-symbols-outlined" data-icon="savings">savings</span>
</div>
<div>
<h3 class="font-headline-md text-headline-md text-on-surface">Tangerine</h3>
<p class="font-label-sm text-label-sm text-tertiary">Last synced: 2m ago</p>
</div>
</div>
<div class="w-8 h-8 rounded-full bg-secondary-fixed flex items-center justify-center text-secondary">
<span class="material-symbols-outlined text-[20px]" data-icon="check_circle">check_circle</span>
</div>
</div>
</section>
<!-- Quick Actions -->
<section class="space-y-sm pt-base">
<h3 class="font-headline-md text-headline-md text-on-surface mb-sm">Quick Actions</h3>
<div class="grid grid-cols-2 gap-sm">
<button class="glass-card rounded-lg p-sm flex flex-col items-center justify-center gap-xs hover:bg-surface-variant/20 transition-colors h-24 active:scale-95 shadow-sm border border-outline-variant">
<div class="w-10 h-10 rounded-full bg-primary-fixed flex items-center justify-center text-primary mb-xs">
<span class="material-symbols-outlined" data-icon="insights">insights</span>
</div>
<span class="font-label-sm text-label-sm text-on-surface text-center">Combined Insights</span>
</button>
<button class="glass-card rounded-lg p-sm flex flex-col items-center justify-center gap-xs hover:bg-surface-variant/20 transition-colors h-24 active:scale-95 shadow-sm border border-outline-variant">
<div class="w-10 h-10 rounded-full bg-primary-fixed flex items-center justify-center text-primary mb-xs">
<span class="material-symbols-outlined" data-icon="sync_alt">sync_alt</span>
</div>
<span class="font-label-sm text-label-sm text-on-surface text-center">Transfer Funds</span>
</button>
</div>
<button class="w-full kinetic-gradient text-on-primary rounded-lg py-sm px-md font-label-md text-label-md shadow-ambient hover:-translate-y-[1px] transition-all duration-200 mt-md flex items-center justify-center gap-sm">
<span>View All Accounts</span>
<span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
</section>
</main>
<!-- BottomNavBar -->
<nav class="bg-surface-container-lowest fixed bottom-0 w-full z-50 md:hidden">
<div class="flex justify-around items-center pt-2 pb-safe-area-inset-bottom w-full px-xs h-16 shadow-[0_-4px_24px_rgba(0,0,0,0.02)]">
<!-- Active: Accounts -->
<button class="flex flex-col items-center justify-center text-primary w-16 h-full hover:bg-surface-variant/20 active:scale-95 transition-transform duration-150 rounded-lg group">
<div class="relative">
<span class="material-symbols-outlined mb-1" data-icon="account_balance" style="font-variation-settings: 'FILL' 1;">account_balance</span>
<div class="absolute -bottom-1 left-1/2 -translate-x-1/2 w-4 h-[3px] kinetic-gradient rounded-full"></div>
</div>
<span class="font-label-sm text-label-sm">Accounts</span>
</button>
<!-- Inactive -->
<button class="flex flex-col items-center justify-center text-tertiary w-16 h-full hover:bg-surface-variant/20 active:scale-95 transition-transform duration-150 rounded-lg">
<span class="material-symbols-outlined mb-1" data-icon="swap_horiz" style="font-variation-settings: 'FILL' 0;">swap_horiz</span>
<span class="font-label-sm text-label-sm">Move Money</span>
</button>
<button class="flex flex-col items-center justify-center text-tertiary w-16 h-full hover:bg-surface-variant/20 active:scale-95 transition-transform duration-150 rounded-lg">
<span class="material-symbols-outlined mb-1" data-icon="payments" style="font-variation-settings: 'FILL' 0;">payments</span>
<span class="font-label-sm text-label-sm">Bills</span>
</button>
<button class="flex flex-col items-center justify-center text-tertiary w-16 h-full hover:bg-surface-variant/20 active:scale-95 transition-transform duration-150 rounded-lg">
<span class="material-symbols-outlined mb-1" data-icon="query_stats" style="font-variation-settings: 'FILL' 0;">query_stats</span>
<span class="font-label-sm text-label-sm">Insights</span>
</button>
<button class="flex flex-col items-center justify-center text-tertiary w-16 h-full hover:bg-surface-variant/20 active:scale-95 transition-transform duration-150 rounded-lg">
<span class="material-symbols-outlined mb-1" data-icon="menu" style="font-variation-settings: 'FILL' 0;">menu</span>
<span class="font-label-sm text-label-sm">More</span>
</button>
</div>
</nav>
</body></html>
